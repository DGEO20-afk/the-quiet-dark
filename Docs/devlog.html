<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Dark — Dev Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0a0c0f;
    --bg2:       #0f1215;
    --bg3:       #141820;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --text:      #d8dce8;
    --text2:     #a8b0c8;
    --text3:     #8890a8;
    --accent:    #6b9fff;
    --accent2:   #4a6acc;
    --green:     #2ecc71;
    --yellow:    #f0c040;
    --red:       #e05555;
    --moon:      #c8d8ff;
    --tag-bg:    rgba(74,124,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .header {
    padding: 3rem 3rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .header-left { flex: 1; min-width: 260px; }

  .game-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1;
  }

  .header h1 span { color: var(--accent); }

  .header-sub {
    font-size: 16px;
    color: var(--text2);
    margin-top: 8px;
    font-weight: 400;
  }

  .stats {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .stat {
    text-align: right;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 31px;
    color: #fff;
    font-weight: 400;
    line-height: 1;
  }

  .stat-label {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 1rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: #3a6aee; color: #fff; border-color: #3a6aee; }

  .filter-group { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; min-height: calc(100vh - 180px); }

  /* ── TIMELINE SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 2rem 0;
    position: sticky;
    top: 0;
    height: calc(100vh - 180px);
    overflow-y: auto;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sidebar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 0 1.5rem;
    margin-bottom: 1rem;
  }

  .timeline-item {
    padding: 10px 1.5rem;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.12s;
    position: relative;
  }

  .timeline-item:hover { background: rgba(255,255,255,0.03); border-left-color: var(--border2); }
  .timeline-item.active { background: rgba(74,124,255,0.08); border-left-color: var(--accent); }

  .tl-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 3px;
  }

  .tl-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .tl-phase {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    padding: 2rem 3rem;
    overflow-y: auto;
  }

  /* ── SESSION CARD ── */
  .session-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2rem;
    background: var(--bg2);
    transition: border-color 0.2s;
  }

  .session-card:hover { border-color: var(--border2); }

  .session-header {
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .session-date-block {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    text-align: center;
    flex-shrink: 0;
    min-width: 58px;
  }

  .s-day {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: #fff;
    line-height: 1;
  }

  .s-month {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .session-meta { flex: 1; }

  .session-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .session-title {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .session-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .tag {
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 13px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.5px;
    border: 1px solid transparent;
  }

  .tag-blender  { background: rgba(255,140,0,0.12);  color: #ff9a2a; border-color: rgba(255,140,0,0.2);  }
  .tag-assets   { background: rgba(46,204,113,0.10); color: #2ecc71; border-color: rgba(46,204,113,0.2); }
  .tag-lighting { background: rgba(200,216,255,0.10);color: var(--moon); border-color: rgba(200,216,255,0.2); }
  .tag-scene    { background: rgba(74,124,255,0.12); color: var(--accent); border-color: rgba(74,124,255,0.2); }
  .tag-planning { background: rgba(240,192,64,0.10); color: var(--yellow); border-color: rgba(240,192,64,0.2); }
  .tag-unity    { background: rgba(180,100,255,0.12);color: #b464ff; border-color: rgba(180,100,255,0.2); }

  .session-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .session-duration {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--text2);
  }

  .chevron {
    font-size: 19px;
    color: var(--text3);
    transition: transform 0.2s;
  }

  .chevron.open { transform: rotate(180deg); }

  /* ── SESSION BODY ── */
  .session-body {
    display: none;
    padding: 1.5rem;
  }

  .session-body.open { display: block; }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 1.25rem;
  }

  .section-label:first-child { margin-top: 0; }

  /* Ziele */
  .goals { display: flex; flex-direction: column; gap: 6px; }

  .goal-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 7px;
    background: var(--bg3);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }

  .goal-item:hover { background: rgba(255,255,255,0.04); }

  .goal-check {
    width: 16px; height: 16px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    font-size: 12px;
  }

  .goal-check.done { background: var(--green); border-color: var(--green); color: #fff; }
  .goal-check.partial { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .goal-check.blocked { background: var(--red); border-color: var(--red); color: #fff; }

  .goal-text { font-size: 16px; color: var(--text); line-height: 1.4; }
  .goal-text.done { color: var(--text2); text-decoration: line-through; }

  /* Notizen */
  .notes-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-size: 16px;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: 'Syne', sans-serif;
  }

  /* Probleme */
  .issues { display: flex; flex-direction: column; gap: 6px; }

  .issue-item {
    display: flex;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 7px;
    border-left: 3px solid var(--red);
    background: rgba(224,85,85,0.06);
    font-size: 16px;
    color: var(--text2);
    line-height: 1.4;
  }

  .issue-item.solved { border-left-color: var(--green); background: rgba(46,204,113,0.06); }
  .issue-item.wip    { border-left-color: var(--yellow); background: rgba(240,192,64,0.06); }

  .issue-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Screenshots */
  .screenshots {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .screenshot-slot {
    width: 120px; height: 72px;
    border: 1px dashed var(--border2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .screenshot-slot:hover { border-color: var(--accent); color: var(--accent); }

  /* Next Steps */
  .next-steps { display: flex; flex-direction: column; gap: 6px; }

  .next-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 7px 10px;
    border-radius: 7px;
    background: rgba(74,124,255,0.06);
    border: 1px solid rgba(74,124,255,0.12);
    font-size: 16px; color: var(--text2); line-height: 1.4;
  }

  .next-arrow { color: var(--accent); flex-shrink: 0; font-size: 14px; margin-top: 1px; }

  /* ── NEW SESSION FORM ── */
  .new-session-card {
    border: 1px dashed var(--border2);
    border-radius: 12px;
    padding: 2rem;
    background: var(--bg2);
    display: none;
  }

  .new-session-card.open { display: block; }

  .form-title {
    font-size: 19px; font-weight: 700; color: #fff; margin-bottom: 1.5rem;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field.full { grid-column: 1/-1; }

  label {
    font-size: 13px; font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px; color: var(--text3); text-transform: uppercase;
  }

  input, textarea, select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }

  textarea { resize: vertical; min-height: 80px; }

  select option { background: var(--bg3); }

  .form-actions { display: flex; gap: 8px; margin-top: 1rem; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
    font-size: 17px;
  }

  /* Scrollbar */
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── TABLET (768px) ── */
  @media (max-width: 768px) {
    .main { flex-direction: column; }

    .sidebar {
      width: 100%;
      height: auto;
      max-height: 220px;
      position: static;
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem 0;
    }

    /* Timeline horizontal scrollen auf Tablet */
    #timeline {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      gap: 0;
      padding-bottom: 4px;
    }

    .timeline-item {
      flex-shrink: 0;
      min-width: 160px;
      border-left: none;
      border-bottom: 2px solid transparent;
      padding: 8px 1rem;
    }

    .timeline-item.active {
      border-bottom-color: var(--accent);
      border-left-color: transparent;
    }

    .header {
      padding: 2rem 1.5rem 1.5rem;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.25rem;
    }

    .stats { gap: 1.5rem; }
    .stat { text-align: left; }

    .toolbar {
      padding: 0.75rem 1.5rem;
      gap: 0.6rem;
    }

    .content { padding: 1.5rem; }

    .session-header { padding: 1rem 1.25rem; }
    .session-body { padding: 1.25rem; }

    .form-grid { grid-template-columns: 1fr; }

    .session-date-block { min-width: 50px; padding: 6px 10px; }
  }

  /* ── MOBILE (375px) ── */
  @media (max-width: 480px) {
    .header { padding: 1.25rem 1rem 1rem; }
    .toolbar { padding: 0.6rem 1rem; gap: 0.5rem; }
    .content { padding: 1rem; }

    /* Header stats untereinander */
    .stats { flex-direction: row; flex-wrap: wrap; gap: 1rem; }
    .stat-val { font-size: 22px; }

    /* Buttons kleiner */
    .btn { padding: 6px 12px; font-size: 13px; }
    .filter-group { width: 100%; }
    .filter-btn { flex: 1; text-align: center; }

    /* Session Card kompakter */
    .session-header {
      padding: 0.85rem 1rem;
      gap: 0.75rem;
    }

    .session-date-block {
      min-width: 44px;
      padding: 5px 8px;
    }

    .s-day { font-size: 18px; }

    .session-title { font-size: 15px; }
    .session-body { padding: 1rem; }

    /* Sidebar horizontal kompakt */
    .timeline-item { min-width: 140px; }
    .tl-title { font-size: 12px; }

    /* Notes Box */
    .notes-box { font-size: 14px; line-height: 1.6; }

    /* Tags umbrechen */
    .session-tags { gap: 4px; }
    .tag { font-size: 10px; padding: 2px 7px; }

    /* Form */
    .new-session-card { padding: 1rem; }
    .form-title { font-size: 15px; }

    /* Screenshots kleiner */
    .screenshot-slot { width: 100px; height: 64px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="game-label">// dev log</div>
    <h1>The Quiet <span>Dark</span></h1>
    <div class="header-sub">Walking Simulator — Solo Indie Project</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="stat-sessions">3</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-hours">9h</div>
      <div class="stat-label">Total Zeit</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-phase">01</div>
      <div class="stat-label">Aktive Phase</div>
    </div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="toggleNewForm()">+ Neue Session</button>
  <button class="btn" onclick="expandAll()">Alle öffnen</button>
  <button class="btn" onclick="collapseAll()">Alle schließen</button>
  <div class="filter-group">
    <button class="filter-btn active" onclick="filterSessions('all', this)">Alle</button>
    <button class="filter-btn" onclick="filterSessions('blender', this)">Blender</button>
    <button class="filter-btn" onclick="filterSessions('unity', this)">Unity</button>
    <button class="filter-btn" onclick="filterSessions('planning', this)">Planning</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">Timeline</div>
    <div id="timeline"></div>
  </div>

  <div class="content">

    <!-- Neue Session Form -->
    <div class="new-session-card" id="new-form">
      <div class="form-title">// Neue Dev Session eintragen</div>
      <div class="form-grid">
        <div class="form-field">
          <label>Datum</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-field">
          <label>Dauer</label>
          <input type="text" id="f-duration" placeholder="z.B. 3h 30min">
        </div>
        <div class="form-field full">
          <label>Session Titel</label>
          <input type="text" id="f-title" placeholder="z.B. Blender Asset Creation — Bäume & Felsen">
        </div>
        <div class="form-field">
          <label>Phase</label>
          <select id="f-phase">
            <option>Phase 1 — Blender Assets</option>
            <option>Phase 2 — Unity Setup</option>
            <option>Phase 3 — Szene</option>
            <option>Phase 4 — Atmosphäre</option>
            <option>Phase 5 — Polish</option>
          </select>
        </div>
        <div class="form-field">
          <label>Tags (kommagetrennt)</label>
          <input type="text" id="f-tags" placeholder="blender, assets, lighting">
        </div>
        <div class="form-field full">
          <label>Was wurde gemacht</label>
          <textarea id="f-notes" placeholder="Beschreibe was in dieser Session passiert ist..."></textarea>
        </div>
        <div class="form-field full">
          <label>Nächste Schritte</label>
          <textarea id="f-next" placeholder="Was kommt als nächstes? (eine Zeile pro Punkt)"></textarea>
        </div>
        <div class="form-field full">
          <label>Probleme / Bugs (optional)</label>
          <textarea id="f-issues" placeholder="Probleme die aufgetreten sind..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveSession()">Session speichern</button>
        <button class="btn" onclick="toggleNewForm()">Abbrechen</button>
      </div>
    </div>

    <!-- Sessions werden hier gerendert -->
    <div id="sessions-container"></div>

  </div>
</div>

<script>
// ── DATEN ──────────────────────────────────────────
const STORAGE_KEY = 'tqd_devlog';

const defaultSessions = [
  {
    id: 1,
    date: '2026-05-20',
    duration: '~4h',
    title: 'Blender Assets & Waldszene — Erster Aufbau',
    phase: 'Phase 1 — Blender Assets',
    tags: ['blender', 'assets', 'scene', 'lighting'],
    notes: `Erste vollständige Blender-Session für The Quiet Dark.\n\nGestartet mit Projektstruktur (TheQuietDark/ Ordner) und Checkliste.\nBlender MCP-Konnektor verbunden und getestet.\n\nAssets erstellt:\n— 4 Baum-Varianten (Tall, Gnarled, Young, Dead) mit mathematisch exakter Ast-Positionierung\n— 3 Fels-Varianten inkl. großer Außenbereichsfelsen\n— Tannenbaum-Funktion mit gestaffelten Kegel-Etagen\n— Farne, Grasbüschel, umgefallener Baumstamm\n— Weg-Dekoration (Steine, Äste, Gras am Rand)\n\nSzene aufgebaut:\n— Langer gerader Waldweg (70 Einheiten) als Tunnel\n— ~50+ Bäume (Laub + Tannen) links & rechts\n— Großfelsen in Außenbereichen\n— Prozedurale Weg-Textur (Noise-basiert)\n— Prozedurale Waldboden-Textur (Erde/Moos)\n\nLighting:\n— FullMoon Spot Light (4500 Energy, kaltes Blau)\n— FillLight Sun (diffuses Mondlicht)\n— TunnelGlow (heller Horizont)\n— MoonPatches (Lichtflecken auf dem Weg)\n— MoonBall + MoonHalo Mesh\n— Fog Glow via Compositor (Glare Node)\n\nEEVEE Next Settings:\n— Raytracing (Screen Space) aktiviert\n— Fast GI (Global Illumination) aktiviert\n— Shadow Jitter für weiche Schatten\n— TAA 16 Samples im Viewport`,
    goals: [
      { text: 'Blender MCP Verbindung testen', status: 'done' },
      { text: '4 Baum-Varianten erstellen', status: 'done' },

// ── STATE ──────────────────────────────────────────
let sessions = [];
let activeFilter = 'all';

function loadSessions() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    sessions = saved ? JSON.parse(saved) : [...defaultSessions];
  } catch(e) {
    sessions = [...defaultSessions];
  }
}

function saveSessions() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch(e) {}
}

// ── RENDER ──────────────────────────────────────────
function render() {
  renderTimeline();
  renderSessions();
  updateStats();
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = sessions.map((s,i) => `
    <div class="timeline-item ${i===0?'active':''}" onclick="scrollToSession(${s.id})" data-id="${s.id}">
      <div class="tl-date">${formatDate(s.date)}</div>
      <div class="tl-title">${s.title.split('—')[0].trim()}</div>
      <div class="tl-phase">${s.phase.split('—')[0].trim()}</div>
    </div>
  `).join('');
}

function renderSessions() {
  const container = document.getElementById('sessions-container');
  const filtered = activeFilter === 'all' ? sessions :
    sessions.filter(s => s.tags.includes(activeFilter));

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">Keine Sessions für diesen Filter.</div>`;
    return;
  }

  container.innerHTML = filtered.map((s, i) => `
    <div class="session-card" id="session-${s.id}" data-tags="${s.tags.join(',')}">
      <div class="session-header" onclick="toggleSession(${s.id})">
        <div class="session-date-block">
          <div class="s-day">${new Date(s.date+'T00:00:00').getDate().toString().padStart(2,'0')}</div>
          <div class="s-month">${getMonth(s.date)}</div>
        </div>
        <div class="session-meta">
          <div class="session-num">SESSION #${String(i+1).padStart(3,'0')}</div>
          <div class="session-title">${s.title}</div>
          <div class="session-tags">
            ${s.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}
          </div>
        </div>
        <div class="session-right">
          <div class="session-duration">${s.duration}</div>
          <div class="chevron ${i===0?'open':''}" id="chev-${s.id}">▼</div>
        </div>
      </div>
      <div class="session-body ${i===0?'open':''}" id="body-${s.id}">

        <div class="section-label">// Ziele & Status</div>
        <div class="goals">
          ${s.goals.map((g,gi) => `
            <div class="goal-item" onclick="toggleGoal(${s.id},${gi})">
              <div class="goal-check ${g.status}" id="gc-${s.id}-${gi}">
                ${g.status==='done'?'✓':g.status==='partial'?'~':g.status==='blocked'?'✕':''}
              </div>
              <div class="goal-text ${g.status==='done'?'done':''}">${g.text}</div>
            </div>
          `).join('')}
        </div>

        <div class="section-label">// Was gemacht wurde</div>
        <div class="notes-box">${s.notes}</div>

        ${s.issues && s.issues.length > 0 ? `
        <div class="section-label">// Probleme & Bugs</div>
        <div class="issues">
          ${s.issues.map(iss => `
            <div class="issue-item ${iss.status}">
              <span class="issue-badge">${iss.status==='solved'?'GELÖST':iss.status==='wip'?'WIP':'OFFEN'}</span>
              ${iss.text}
            </div>
          `).join('')}
        </div>
        ` : ''}

        <div class="section-label">// Nächste Schritte</div>
        <div class="next-steps">
          ${s.next.map(n => `
            <div class="next-item">
              <span class="next-arrow">→</span>
              ${n}
            </div>
          `).join('')}
        </div>

        <div class="section-label">// Screenshots</div>
        <div class="screenshots">
          <div class="screenshot-slot">+ BILD</div>
          <div class="screenshot-slot">+ BILD</div>
          <div class="screenshot-slot">+ BILD</div>
        </div>

      </div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('stat-sessions').textContent = sessions.length;
  let totalH = 0;
  sessions.forEach(s => {
    const m = s.duration.match(/(\d+(\.\d+)?)\s*h/);
    if (m) totalH += parseFloat(m[1]);
  });
  document.getElementById('stat-hours').textContent = totalH > 0 ? totalH + 'h' : '—';
  const phases = [...new Set(sessions.map(s => s.phase.split('—')[0].trim().replace('Phase ', '')))];
  document.getElementById('stat-phase').textContent = phases[phases.length - 1] || '01';
}

// ── INTERACTIONS ──────────────────────────────────────
function toggleSession(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleGoal(sessionId, goalIdx) {
  const s = sessions.find(s => s.id === sessionId);
  if (!s) return;
  const g = s.goals[goalIdx];
  const states = ['', 'done', 'partial', 'blocked'];
  const curr = states.indexOf(g.status);
  g.status = states[(curr + 1) % states.length];
  saveSessions();
  renderSessions();
}

function expandAll() {
  document.querySelectorAll('.session-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.session-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
}

function filterSessions(tag, btn) {
  activeFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSessions();
}

function scrollToSession(id) {
  const el = document.getElementById(`session-${id}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.timeline-item').forEach(t => t.classList.remove('active'));
  const tl = document.querySelector(`[data-id="${id}"]`);
  if (tl) tl.classList.add('active');
}

function toggleNewForm() {
  const form = document.getElementById('new-form');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    form.scrollIntoView({ behavior: 'smooth' });
  }
}

function saveSession() {
  const date     = document.getElementById('f-date').value;
  const duration = document.getElementById('f-duration').value || '—';
  const title    = document.getElementById('f-title').value;
  const phase    = document.getElementById('f-phase').value;
  const tagsRaw  = document.getElementById('f-tags').value;
  const notes    = document.getElementById('f-notes').value;
  const nextRaw  = document.getElementById('f-next').value;
  const issRaw   = document.getElementById('f-issues').value;

  if (!date || !title) { alert('Datum und Titel sind Pflicht!'); return; }

  const tags  = tagsRaw.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
  const next  = nextRaw.split('\n').map(t=>t.trim()).filter(Boolean);
  const issues = issRaw ? issRaw.split('\n').map(t=>t.trim()).filter(Boolean)
    .map(t => ({ text: t, status: 'open' })) : [];

  const newSession = {
    id: Date.now(),
    date, duration, title, phase,
    tags: tags.length ? tags : ['blender'],
    notes, goals: [], issues, next
  };

  sessions.unshift(newSession);
  saveSessions();

  // Form leeren
  ['f-date','f-duration','f-title','f-tags','f-notes','f-next','f-issues']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('new-form').classList.remove('open');
  render();
}

// ── UTILS ──────────────────────────────────────────
function formatDate(d) {
  const date = new Date(d+'T00:00:00');
  return `${date.getDate().toString().padStart(2,'0')}.${(date.getMonth()+1).toString().padStart(2,'0')}.${date.getFullYear()}`;
}

function getMonth(d) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEZ'];
  return months[new Date(d+'T00:00:00').getMonth()];
}

// ── INIT ──────────────────────────────────────────
loadSessions();
render();
</script>
